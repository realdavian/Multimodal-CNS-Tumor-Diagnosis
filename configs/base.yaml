# Hydra: use +experiment=<name> to load an override from configs/experiments/
# Example: python scripts/train.py +experiment=baseline_swin3d

seed: 42
outputs: outputs
dataset: synthetic
data_root: data
cohort_csv: null
mode: vision_only       # "vision_only" or "multimodal"

image_size: 224
num_slices: 128
num_classes: 2
num_seg_classes: 4
text_maxlen: 128
batch_size: 8
num_workers: 2
epochs: 20
lr: 5e-5
weight_decay: 1e-4
warmup_frac: 0.1
dropout: 0.3

augmentation: false      # toggle data augmentation (flips, rotations, intensity shifts)

cv:
  enabled: false         # toggle stratified k-fold cross-validation
  n_folds: 5             # number of CV folds

max_steps: null         # set to int for smoke tests

# Loss configuration
# classification: cross_entropy | weighted_ce
# segmentation:   dice_ce | dice_focal  (multitask only)
loss:
  classification: cross_entropy
  segmentation: dice_ce
  w_sd: 0.5               # self-distillation weight
  w_seg: 1.0              # segmentation weight (multitask only)
  w_align: 1.0            # alignment weight (multimodal only)

# Self-distillation
self_distillation: true
ema_momentum: 0.999

# Legacy keys (kept for backward compat, prefer loss.* above)
w_sd: 0.5
w_align: 1.0

vision:
  backbone: 'vit_base_patch16_224'
  pretrained: true
  cnn_stem: true
  variant: 'fixed'      # fixed | no_pool | original | slice_wise | swin3d

text:
  model_name: 'emilyalsentzer/Bio_ClinicalBERT'
  freeze_layers: 0

trainer:
  mixed_precision: true
  grad_clip: 1.0
  log_every: 10
  val_every: 1000

wandb:
  enabled: false
  project: avlt
  entity: null
  tags: []
  notes: ""
