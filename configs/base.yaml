# Hydra: use +experiment=<name> to load an override from configs/experiments/
# Example: python scripts/train.py +experiment=baseline_swin3d

seed: 42
outputs: outputs
dataset: synthetic
data_root: data
mode: vision_only       # "vision_only" or "multimodal"

image_size: 224
num_slices: 128
num_classes: 2
text_maxlen: 128
batch_size: 8
num_workers: 2
epochs: 3
lr: 1e-4
weight_decay: 1e-4
warmup_frac: 0.1
dropout: 0.3

max_steps: null         # set to int for smoke tests

# Self-distillation
self_distillation: true
ema_momentum: 0.999
w_sd: 0.5

# Cross-modal alignment (multimodal only, ignored in vision-only)
w_align: 1.0

vision:
  backbone: 'vit_base_patch16_224'
  pretrained: true
  cnn_stem: true
  variant: 'fixed'      # fixed | no_pool | original | slice_wise | swin3d

text:
  model_name: 'emilyalsentzer/Bio_ClinicalBERT'
  freeze_layers: 0

trainer:
  mixed_precision: true
  grad_clip: 1.0
  log_every: 10
  val_every: 1000

wandb:
  enabled: false
  project: avlt
  entity: null
  tags: []
  notes: ""
