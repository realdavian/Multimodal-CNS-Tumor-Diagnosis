# Vision-only config  (no text branch, no alignment loss)
# Self-distillation via EMA teacher is still active.

seed: 42
outputs: outputs/vision_only
dataset: synthetic
data_root: data
image_size: 224
num_slices: 128
num_classes: 2
batch_size: 2
num_workers: 2
epochs: 3
lr: 1e-4
weight_decay: 1e-4
warmup_frac: 0.1
dropout: 0.3
ema_momentum: 0.999

w_sd: 0.5        # self-distillation weight  (w_align removed)

vision:
  backbone: 'vit_base_patch16_224'
  pretrained: true
  cnn_stem: true
  variant: 'swin3d'   # 'fixed', 'no_pool', 'slice_wise', 'swin3d', 'swinumamba'

trainer:
  mixed_precision: true
  grad_clip: 1.0
  log_every: 10
  val_every: 1000
